spec_version: state_ttt_qwen3vl8b_high_capacity_sgd_v6_retrieval_history
config_schema_version: 4

paths:
  model_root_env: QWEN_MODEL_ROOT
  svcbench_root_env: SVCBENCH_ROOT
  hf_home_env: HF_HOME
  output_root_env: OUTPUT_ROOT

data:
  grouped_annotation_file: data/vcbench_data.jsonl
  flat_annotation_file: data/vcbench_eval.jsonl
  video_directory: data/videos
  group_key_fields: [source_dataset, video_path]
  group_k_folds: 5
  fold_seed: 42
  runtime_allowlist: [video, question, query_time, explicit_time_values]
  runtime_denylist: [answer, count, occurrence_times, counting_type, counting_subtype]
  official_clean_selection_forbidden: true

video_preprocessing:
  sample_fps: 2.0
  frames_per_chunk: 16
  stride_frames: 8
  causal_boundary: right_closed
  processor_shortest_edge: 4096
  processor_longest_edge: 25165824
  patch_size: 16
  temporal_patch_size: 2
  spatial_merge_size: 2
  pad_value: 0.0
  full_tubelet_required_for_state: true

model:
  base_model: Qwen/Qwen3-VL-8B-Instruct
  revision: 0c351dd01ed87e9c1b53cbc748cba10e6187ff3b
  transformers_version: 4.57.1
  vision:
    depth: 27
    hidden_size: 1152
    num_heads: 16
    patch_size: 16
    temporal_patch_size: 2
    spatial_merge_size: 2
    output_size: 4096
    deepstack_visual_indexes: [8, 16, 24]
  llm:
    num_layers: 36
    hidden_size: 4096
  online_freeze:
    vision: true
    merger: true
    deepstack: true
    llm: true

fast_ttt:
  input_dim: 4096
  bottleneck_dim: 768
  output_dim: 4096
  residual_scale: 0.1
  rms_norm_eps: 1.0e-6
  slow_projection_bias: true
  fast_bias: false
  fast_initialization: xavier_uniform
  fast_matrix_count: 2
  online_parameter_count: 1179648
  update_order: observe_state_then_update_for_next_chunk
  optimizer:
    name: sgd
    learning_rate: 1.0e-4
    momentum: 0.0
    weight_decay: 0.0
    steps_per_chunk: 1
    grad_clip_norm: 1.0
    reset_per_video: true
    meta_gradient_mode: full_second_order

spatial_encoder:
  input_dim: 4096
  hidden_dim: 768
  stages: 2
  num_heads: 12
  head_dim: 64
  refinements_per_stage: 3
  ffn_dim: 3072
  active_slots: 32
  max_active_slots: 64
  query_dim: 512
  layer_norm_eps: 1.0e-5
  slot_initialization: shared_seed_plus_fixed_sinusoidal_codes
  attention_normalization: softmax_slots_then_normalize_tokens
  attention_epsilon: 1.0e-8
  confidence_mode: attention_occupancy
  overflow_policy: preserve_existing_reject_excess
  slot_valid_mask: true
  log_overflow: true

temporal_encoder:
  input_dim: 4096
  hidden_dim: 768
  num_layers: 6
  num_heads: 12
  head_dim: 64
  ffn_dim: 3072
  dropout: 0.1
  position_encoding: absolute_sinusoidal
  layer_norm_eps: 1.0e-5
  activation: gelu
  pre_norm: true
  attention_projection_bias: true
  strict_causal: true
  causal_includes_self: true
  causal_window_includes_current: true
  cache_tubelets: 64
  cache_mode: layerwise_kv
  position_id_mode: explicit_global
  overlap_policy: replay_replace
  overlap_tubelets: 4
  replay_context_tubelets: 3
  cache_owner_keys: [video_id, trajectory_id, query_signature]
  detach_cache_default: true
  query_dim: 512
  parameter_count: 48438272

observation_heads:
  temporal_input_conditioning: inherited_query_conditioned_h_t
  raw_logits: true
  debug_probabilities: true
  output_valid_mask: true
  output_timestamps: true
  output_position_ids: true
  invalid_output_policy: zero_tensors_negative_one_metadata
  online_frozen: true
  online_forward_no_grad: false
  detach_inputs: false
  hard_state_mutation: false
  o1:
    input_dim: 768
    query_dim: 512
    film_dim: 1536
    hidden_dims: [1024, 1024]
    output_dim: 6
    output_names: [object, target, visible, enter, exit, confidence]
    layer_norm_eps: 1.0e-5
    film_mode: one_plus_scale_and_shift
    activation: silu
    dropout: 0.0
    linear_bias: true
    parameter_count: 2632710
    object_threshold: 0.5
    target_threshold: 0.5
    visible_threshold: 0.5
    enter_threshold: 0.5
    exit_threshold: 0.5
    confidence_threshold: 0.5
    baseline_policy: explicit_set_once_per_trajectory
    count_update_policy: recompute_from_full_slot_state
    committed_position_policy: idempotent_preserve_and_audit_drift
    threshold_status: bootstrap_calibration_required
  o2:
    input_dim: 768
    hidden_dims: [1024, 1024]
    identity_dim: 256
    score_dim: 2
    score_names: [novelty, match_confidence]
    layer_norm_eps: 1.0e-5
    activation: silu
    dropout: 0.0
    linear_bias: true
    identity_normalization: l2_fp32_unit_basis_fallback
    normalization_eps: 1.0e-8
    parameter_count: 2103042
    prototype_ema: 0.9
    confirmation_observations: 2
    match_threshold: 0.8
    novelty_threshold: 0.5
    match_confidence_threshold: 0.5
    reliability_threshold: 0.5
    candidate_low_confidence_threshold: 0.5
    match_ambiguity_margin: 1.0e-6
    threshold_status: bootstrap_calibration_required
  e1:
    input_dim: 768
    channels: 512
    num_layers: 5
    kernel_size: 3
    dilations: [1, 2, 4, 8, 16]
    output_dim: 3
    output_names: [eventness, completion, transition]
    layer_norm_eps: 1.0e-5
    activation: silu_filter_sigmoid_gate
    strict_causal: true
    batch_norm: false
    dropout: 0.0
    convolution_bias: true
    causal_padding: left
    receptive_field: 63
    streaming_state_mode: projected_history
    overlap_tubelets: 4
    history_tubelets: 66
    state_owner_keys: [video_id, trajectory_id, query_signature]
    detach_runtime_default: true
    parameter_count: 9584643
    tau_on: 0.7
    tau_off: 0.3
    completion_threshold: 0.7
    transition_threshold: 0.7
    min_gap_seconds: 0.5
    fsm_policy: eventness_hysteresis_completion_transition
    cooldown_nms_source: min_gap_seconds
    committed_position_policy: idempotent_ignore_and_audit
    threshold_status: bootstrap_calibration_required
  e2:
    input_dim: 768
    hidden_dim: 768
    num_layers: 2
    event_output_dim: 4
    phase_output_dim: 4
    event_names: [start, active, end, complete]
    phase_names: [inactive, active, end_candidate, completed]
    layer_norm_eps: 1.0e-5
    bidirectional: false
    batch_first: true
    bias: true
    dropout: 0.0
    streaming_state_mode: hidden_with_rollback_checkpoints
    overlap_tubelets: 4
    checkpoint_tubelets: 5
    state_owner_keys: [video_id, trajectory_id, query_signature]
    detach_runtime_default: true
    parameter_count: 7094792
    start_threshold: 0.6
    end_threshold: 0.6
    complete_threshold: 0.7
    rearm_max_event_probability: 0.5
    rearm_phase: inactive
    completed_hold_positions: 1
    fsm_policy: phase_gated_single_transition_per_position
    active_evidence_policy: diagnostic_and_phase_consistency_only
    committed_position_policy: idempotent_ignore_and_audit
    threshold_status: bootstrap_calibration_required

state_bank:
  semantic_dim: 512
  identity_dim: 256
  semantic_projector:
    input_dim: 768
    hidden_dim: 1024
    output_dim: 512
    head_type_count: 4
    head_types: [o1, o2, e1, e2]
    layer_norm_eps: 1.0e-5
    activation: silu
    dropout: 0.0
    linear_bias: true
    normalization_dtype: float32
    normalization_eps: 1.0e-8
    zero_norm_fallback: first_unit_basis
    parameter_count: 1316864
    included_in_model_state_dict: true
    included_in_outer_optimizer: true
    included_in_inner_optimizer: false
    online_frozen: true
    online_forward_no_grad: false
    detach_inputs: false
  confirmed_store:
    initial_capacity: 256
    growth_chunk: 256
    hard_limit: null
    storage_device: cpu
    storage_dtype: float32
    exact_search: true
    ann_enabled: false
    gpu_hot_capacity: 256
    hot_cache_enabled: true
    hot_cache_device: cuda
    hot_cache_dtype: bfloat16
    eviction_policy: lru_position_then_identity_id
  candidate_store:
    initial_capacity: 64
    growth_chunk: 64
    hard_limit: 512
    ttl_chunks: 8
    match_threshold: 0.8
    reliability_threshold: 0.5
    low_confidence_threshold: 0.5
    ttl_refresh_policy: reset_to_full_on_reliable_match
    ttl_aging_policy: match_first_then_unmatched_decrement_once_per_new_committed_position_remove_at_zero_end
    promotion_policy: two_reliable_distinct_consecutive_committed_positions
    overflow_policy: expire_then_low_confidence_then_reject
    prune_order: [expired, low_confidence, confidence_asc, last_position_id_asc, candidate_id_asc, reject_new]
  event_history_capacity: 512
  retrieval_history_capacity_per_head: 512
  retrieval_history_source_dim: 768
  isolation_keys: [video_id, trajectory_id, head_type]
  hard_updates_no_grad: true
  detach_before_write: true
  runtime_in_model_state_dict: false
  runtime_registered_parameters: false
  runtime_registered_buffers: false
  runtime_in_outer_optimizer: false
  runtime_in_inner_optimizer: false
  snapshot_separate_from_model_checkpoint: true
  record_time_metadata_policy: exactly_one
  record_id_policy: trajectory_monotonic_never_reuse
  aggregate_record_heads: [o1, e1, e2]
  aggregate_update_mode: functional_replace
  committed_position_policy: idempotent_ignore_and_audit
  o2_p9_policy: generic_crud_only_p10_owns_lifecycle
  o2_lifecycle_owner: identity_bank_p10
  o2_candidate_retrieval_eligible: false
  o2_confirmed_retrieval_eligible: true
  dynamic_view_padding: batch_max
  n_state_definition: owner_head_present_records_before_filters
  event_kind_provenance: hard_operator_frozen_per_aggregate

query_encoder:
  input_dim: 4096
  hidden_dim: 768
  num_layers: 4
  num_heads: 12
  head_dim: 64
  ffn_dim: 3072
  dropout: 0.1
  output_dim: 512
  bidirectional: true
  position_encoding: sinusoidal
  pooling: learned_attention

operator_router:
  prototypes:
    - o1-snap
    - o1-delta
    - o2-unique
    - o2-gain
    - e1-action
    - e1-transit
    - e2-periodic
    - e2-episode
    - unsupported
  output_dim: 512
  temperature_initial: 1.0
  temperature_trainable: true
  confidence_threshold: null
  threshold_status: calibration_required

time_resolver:
  modes: [now, history, recent, explicit_range]
  input_dim: 512
  hidden_dim: 256
  mode_count: 4
  token_hidden_dim: 768
  pointer_heads: 2
  confidence_threshold: null
  threshold_status: calibration_required

retriever:
  semantic_dim: 512
  record_similarity_threshold: 0.35
  threshold_status: bootstrap_calibration_required
  similarity_dtype: float32
  normalization_eps: 1.0e-8
  zero_query_policy: unsupported
  threshold_comparison: greater_than_or_equal
  record_confidence_threshold: null
  operator_head_types: [o1, o1, o2, o2, e1, e1, e2, e2, null]
  filter_order: [invalid, retrieval_ineligible, future, outside_window, below_similarity]
  selection_order: [score_desc, record_id_asc]
  owner_mismatch_status: invalid
  aggregate_time_policy: causal_availability_only_window_in_reader
  atomic_window_boundary: closed
  metrics_policy: offline_ground_truth_runtime_label_free
  top_k: null
  ann_enabled: false

state_resampler:
  num_queries: 16
  num_layers: 3
  num_heads: 8
  head_dim: 64
  ffn_dim: 2048
  hidden_dim: 512
  output_dim: 4096
  layer_norm_eps: 1.0e-5
  activation: gelu
  dropout: 0.0
  attention_bias: true
  output_projection_bias: true
  attention_softmax_dtype: float32
  empty_record_embedding: true
  empty_record_policy: internal_trainable_kv_external_zero_width
  attention_audit: final_layer_mean_heads_selected_mass
  parameter_count: 14722048

state_reader:
  signed_exact_count: true
  empty_exact_count: 0
  status_propagation: retriever_exact
  o1_delta_policy: fixed_baseline_v1
  o2_identity_key: identity_id
  point_window_boundary: closed
  e1_history_policy: cumulative_or_retained_completion_times
  e1_truncated_window_status: invalid
  e2_window_anchor: completion_end
  event_kind_mismatch_status: invalid
  number_text_format: canonical_ascii_signed_decimal
  tokenizer_add_special_tokens: false
  tokenizer_roundtrip_required: true
  tokenizer_class: Qwen2TokenizerFast
