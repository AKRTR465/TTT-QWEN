model:
  base_model: Qwen/Qwen3-VL-8B-Instruct
  transformers_version: 4.57.1
  vision_hidden_size: 1152
  vision_depth: 27
  vision_output_size: 4096
  deepstack_visual_indexes: [8, 16, 24]
  llm_hidden_size: 4096
  llm_layers: 36
  freeze_vision_online: true
  freeze_merger_online: true
  freeze_deepstack_online: true
  freeze_llm_online: true

video:
  fps: 2.0
  frames_per_chunk: 16
  stride_frames: 8
  strict_query_cut: true

fast_ttt:
  bottleneck_dim: 512
  mlp_layers: 2
  residual_scale: 0.1
  update_order: observe_state_then_update_for_next_chunk
  optimizer: sgd
  learning_rate: 1.0e-4
  momentum: 0.0
  weight_decay: 0.0
  steps_per_chunk: 1
  grad_clip_norm: 1.0
  reset_per_video: true

ttt_loss:
  temporal_prediction_weight: 1.0
  identity_overlap_weight: 0.5
  event_overlap_weight: 0.5
  o1_unlabeled_weight: 0.0
  auxiliary_outer_weight: 0.1

temporal_encoder:
  hidden_size: 512
  num_layers: 2
  num_heads: 8
  intermediate_size: 2048
  dropout: 0.1
  causal: true

o1:
  active_slot_budget: 16
  max_active_slots: 32
  slot_dim: 512
  shared_query_conditioned_init: true
  use_slot_valid_mask: true
  log_active_slot_overflow: true

o2:
  identity_dim: 128
  prototype_ema: 0.9
  confirmation_observations: 2
  confirmed_store:
    initial_capacity: 128
    growth_chunk: 128
    hard_limit: null
    storage_device: cpu
    storage_dtype: float32
    gpu_hot_capacity: 128
  candidate_store:
    initial_capacity: 32
    growth_chunk: 32
    hard_limit: 256
    ttl_chunks: 8
    overflow_policy: prune_stale_then_low_confidence
  matching:
    search_full_confirmed_store: true
    exact_search_threshold: 2048
    ann_enabled: false

e1:
  hidden_size: 256
  tcn_dilations: [1, 2, 4]
  tau_on: 0.7
  tau_off: 0.3
  min_gap_seconds: 0.5
  recent_event_capacity: 256

e2:
  hidden_size: 512
  phase_states: 4
  start_threshold: 0.6
  end_threshold: 0.6
  complete_threshold: 0.7
  recent_event_capacity: 256

state_reader:
  state_token_count: 8
  state_token_dim: 4096
  serialize_exact_number: true
  direct_numeric_audit: true
