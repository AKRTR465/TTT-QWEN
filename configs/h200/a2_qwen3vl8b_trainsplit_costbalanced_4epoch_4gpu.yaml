model_name_or_path: $MODEL
trust_remote_code: true
flash_attn: sdpa
image_max_pixels: 131072
video_max_pixels: 131072
video_fps: 2.0
video_maxlen: 256

stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: false
freeze_multi_modal_projector: false
freeze_language_model: false
deepspeed: configs/h200/deepspeed_zero1_dynamic_graph.json

dataset_dir: $DATASET_DIR
dataset: $DATASET_NAME
template: qwen3_vl_nothink
cutoff_len: 16384
packing: false
preprocessing_num_workers: 1
dataloader_num_workers: 2
dataloader_prefetch_factor: 2
dataloader_persistent_workers: true
dataloader_pin_memory: true
data_shared_file_system: true
remove_unused_columns: false

output_dir: $OUTPUT_DIR
logging_steps: 1
save_strategy: steps
save_steps: 0.5
save_total_limit: 2
save_only_model: false
overwrite_output_dir: false
report_to: none
load_best_model_at_end: false

per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 4.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
optim: adamw_torch
bf16: true
tf32: true
gradient_checkpointing: true
use_reentrant_gc: false
ddp_timeout: 180000000
seed: 42
data_seed: 42
resume_from_checkpoint: null

ttt_qwen:
  stage: a2
  project_config: configs/model_state_ttt_8b.yaml
  dataset_manifest: $SVCBENCH_DATASET_MANIFEST
  visual_cost_index: $VISUAL_COST_INDEX
  support_prefetch_depth: 2
  support_decode_coalesce: true
  support_materialization: dataloader_episode
  prepared_episode_max_bytes: 2147483648
  support_visual_batch_size: 1
  query_encoder_reuse: true
  query_visual_mode: causal_prefix
  query_frame_sampling: llamafactory_uniform_cap
  query_sample_fps: 2.0
  query_max_frames: 256
  state_query_visual_mode: recent_chunk
  state_query_max_frames: 16
  answer_query_visual_mode: causal_prefix
  answer_query_max_frames: 256
  query_decode_strategy: grouped_seek
  query_decode_max_groups: 16
  query_cache_mode: disabled
  query_activation_offload: false
  preprocess_cache_mode: readonly
  preprocess_cache_miss_policy: error
  preprocess_cache_root_env: TTT_PREPROCESS_CACHE_ROOT
  preprocess_cache_max_gb: 800
  preprocess_cache_dtype: float32
  visual_cost_mode: exact_tokens
  runtime_trace_mode: cuda
  runtime_trace_dir: $RUN_ROOT/runtime_trace
  segment_prefetch_depth: 0
